global:
  scrape_interval: 15s

scrape_configs:
  # AssistLens application metrics (active sessions, participants, errors).
  - job_name: assistlens-api
    metrics_path: /api/metrics
    static_configs:
      - targets: ["api:8080"]

  # LiveKit server's built-in metrics.
  - job_name: livekit
    static_configs:
      - targets: ["livekit:6789"]
