# LiveKit Egress configuration — records room composites to MinIO (S3).
api_key: devkey
api_secret: devsecretdevsecretdevsecretdevse
# LiveKit Egress — shares LiveKit's network stack (see docker-compose network_mode).
ws_url: ws://127.0.0.1:7880
insecure: true
redis:
  address: redis:6379
s3:
  access_key: assistlens
  secret: assistlens-minio
  region: us-east-1
  endpoint: http://minio:9000
  bucket: recordings
  force_path_style: true
logging:
  level: info
