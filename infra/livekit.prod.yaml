# Production self-hosted LiveKit config template (Railway / Render / Fly).
# Mount this as the container's /etc/livekit.yaml (or pass via --config).
# Replace the webhook URL placeholder with your deployed API URL.
#
# API keys are injected via the LIVEKIT_KEYS env var:
#   LIVEKIT_KEYS=<API_KEY>: <API_SECRET>
port: 7880
bind_addresses:
  - ""

rtc:
  # Many PaaS only expose one TCP port publicly. ICE-over-TCP + embedded TURN
  # keeps connectivity working without a wide UDP range. Open UDP if your host
  # allows it for best media quality.
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: true

turn:
  enabled: true
  udp_port: 7882

webhook:
  api_key: REPLACE_WITH_LIVEKIT_API_KEY
  urls:
    - https://REPLACE_WITH_API_HOST/api/webhooks/livekit

logging:
  level: info

prometheus_port: 6789
